<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>西洋棋</title>
    <style>
      :root{--bg:#ffffff;--light:#f0d9b5;--dark:#b58863;--accent:#6B8E23}
      *{box-sizing:border-box}
      body{font-family:system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;margin:0;background:var(--bg);color:#111;display:flex;align-items:center;justify-content:center;padding:24px}
      .wrap{max-width:900px;width:100%}
      h1{margin:0 0 12px;text-align:center}
      .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
      .board{width:520px;height:520px;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);border:4px solid #333;margin:auto}
      .square{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:600;cursor:pointer;user-select:none}
      .light{background:var(--light)}
      .dark{background:var(--dark)}
      .highlight{outline:3px solid rgba(107,142,35,0.6)}
      .white-piece{color:#fff;text-shadow:1px 1px 2px #000}
      .black-piece{color:#000;text-shadow:1px 1px 1px #ccc}
      .controls{display:flex;flex-direction:column;gap:8px;padding-left:16px}
      .info{font-size:16px}
      .btn{padding:8px 10px;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer}
      .row{display:flex;gap:12px}
      pre{white-space:pre-wrap;background:#f7f7f7;padding:8px;border-radius:6px}
      #status.win{color:#c00;font-weight:700;font-size:1.2em}
      @media(max-width:880px){.wrap{padding:8px}.board{width:360px;height:360px}}
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>西洋棋（點選棋格移動）</h1>
      <div class="top">
        <div class="info">
          <div>回合：<strong id="turn">白方</strong></div>
          <div id="status">狀態：進行中</div>
        </div>
        <div class="controls">
          <div class="row">
            <button id="undo" class="btn">悔棋</button>
            <button id="reset" class="btn">重置</button>
          </div>
          <div>
            <div style="font-weight:600">棋局記錄（PGN）</div>
            <pre id="pgn" style="max-height:140px;overflow:auto"></pre>
          </div>
        </div>
      </div>

      <div style="display:flex;gap:16px;align-items:flex-start">
        <div id="board" class="board" role="grid" aria-label="西洋棋棋盤"></div>
      </div>
    </div>

    <script src="https://unpkg.com/chess.js@1.0.0/chess.min.js"></script>
    <script>
      const boardEl = document.getElementById('board')
      const statusEl = document.getElementById('status')
      const turnEl = document.getElementById('turn')
      const undoBtn = document.getElementById('undo')
      const resetBtn = document.getElementById('reset')

      // if chess.js failed to load, fall back to simple static board
      if(typeof Chess !== 'function'){
        // manual logic from previous version
        let boardState = [
          '♜','♞','♝','♛','♚','♝','♞','♜',
          '♟','♟','♟','♟','♟','♟','♟','♟',
          '','','','','','','','',
          '','','','','','','','',
          '','','','','','','','',
          '','','','','','','','',
          '♙','♙','♙','♙','♙','♙','♙','♙',
          '♖','♘','♗','♕','♔','♗','♘','♖'
        ]
        let selected = null
        let turn = 'w'
        let history = []
        let gameOver = false

        function makeBoard(){
          boardEl.innerHTML = ''
          for(let r=8;r>=1;r--){
            for(let f=0;f<8;f++){
              const idx = (8-r)*8 + f
              const div = document.createElement('div')
              div.className = 'square ' + (((f + r) % 2 === 0) ? 'light' : 'dark')
              div.dataset.index = idx
              div.addEventListener('click', onSquareClick)
              boardEl.appendChild(div)
            }
          }
        }
        function render(){
          const squares = boardEl.querySelectorAll('.square')
          squares.forEach(sqEl=>{
            const idx=Number(sqEl.dataset.index)
            sqEl.textContent=boardState[idx]||''
            sqEl.classList.remove('highlight')
          })
          if(selected!==null){
            boardEl.children[selected].classList.add('highlight')
          }
          turnEl.textContent=turn==='w'?'白方':'黑方'
          if(!gameOver){ // only overwrite when game still going
            statusEl.textContent='狀態：進行中'
            statusEl.classList.remove('win')
          }
        }
        function onSquareClick(e){
          if(gameOver) return
          const idx=Number(e.currentTarget.dataset.index)
          if(selected===null){
            const piece=boardState[idx]
            if(piece && ((turn==='w'&&isWhite(piece))||(turn==='b'&&isBlack(piece)))){
              selected=idx;render()
            }
          } else {
            const dest=boardState[idx]
            if(dest && ((turn==='w'&&isWhite(dest))||(turn==='b'&&isBlack(dest)))){selected=null;render();return}
            // only allow legal moves in manual fallback
            if(typeof legalManualMove === 'function' && !legalManualMove(selected, idx)){
              statusEl.textContent = '不合法的走法';
              // keep selection active
              return;
            }
            history.push(boardState.slice())
            const moved=boardState[selected]
            boardState[idx]=moved;boardState[selected]=''
            // promotion: pawn reaches last rank auto convert to queen
            if(moved==='♙' && Math.floor(idx/8)===0) boardState[idx]='♕'
            if(moved==='♟' && Math.floor(idx/8)===7) boardState[idx]='♛'
            if(dest && (dest==='♔'||dest==='♚')){finish(turn==='w'?'白方 贏了！':'黑方 贏了！');render();return}
            selected=null
            turn= turn==='w'?'b':'w'
            render()
          }
        }
        function isWhite(piece){return ['♙','♖','♘','♗','♕','♔'].includes(piece)}
        function isBlack(piece){return ['♟','♜','♞','♝','♛','♚'].includes(piece)}
        function finish(text){
          statusEl.textContent=text
          statusEl.classList.add('win')
          gameOver = true
        }
        
        
        function legalManualMove(from,to){
          const piece=boardState[from]
          if(!piece) return false
          const target=boardState[to]
          // can't capture own piece
          if(target && ((isWhite(piece)&&isWhite(target))||(isBlack(piece)&&isBlack(target)))) return false

          const fromRow = Math.floor(from/8)
          const toRow = Math.floor(to/8)
          const fromCol = from%8
          const toCol = to%8
          const rowDiff = toRow - fromRow
          const colDiff = toCol - fromCol

          // pawn handled specially above
          if(piece==='♙' || piece==='♟'){
            const dir = isWhite(piece)? -1 : 1
            // straight move
            if(colDiff===0){
              if(rowDiff===dir) return target===''
              if(rowDiff===2*dir){
                if((isWhite(piece)&&fromRow===6)||(isBlack(piece)&&fromRow===1)){
                  const mid = from + dir*8
                  return boardState[mid]==='' && target===''
                }
              }
              return false
            }
            // capture diagonal
            if(Math.abs(colDiff)===1 && rowDiff===dir) return target!==''
            return false
          }

          // knight moves: L-shape
          if(piece==='♘' || piece==='♞'){
            if((Math.abs(rowDiff)===2 && Math.abs(colDiff)===1) ||
               (Math.abs(rowDiff)===1 && Math.abs(colDiff)===2)) return true
            return false
          }

          // king: one square any direction
          if(piece==='♔' || piece==='♚'){
            return Math.abs(rowDiff)<=1 && Math.abs(colDiff)<=1
          }

          // rook, bishop, queen require path checks
          function pathClear(deltaRow, deltaCol){
            let r=fromRow+deltaRow, c=fromCol+deltaCol
            while(r!==toRow || c!==toCol){
              const idx = r*8 + c
              if(boardState[idx] !== '') return false
              r += deltaRow; c += deltaCol
            }
            return true
          }

          // rook
          if(piece==='♖' || piece==='♜'){
            if(fromRow===toRow){
              const step = colDiff>0?1:-1
              return pathClear(0,step)
            }
            if(fromCol===toCol){
              const step = rowDiff>0?1:-1
              return pathClear(step,0)
            }
            return false
          }

          // bishop
          if(piece==='♗' || piece==='♝'){
            if(Math.abs(rowDiff)===Math.abs(colDiff)){
              const stepR = rowDiff>0?1:-1
              const stepC = colDiff>0?1:-1
              return pathClear(stepR,stepC)
            }
            return false
          }

          // queen
          if(piece==='♕' || piece==='♛'){
            if(rowDiff===0){
              const step = colDiff>0?1:-1
              return pathClear(0,step)
            }
            if(colDiff===0){
              const step = rowDiff>0?1:-1
              return pathClear(step,0)
            }
            if(Math.abs(rowDiff)===Math.abs(colDiff)){
              const stepR = rowDiff>0?1:-1
              const stepC = colDiff>0?1:-1
              return pathClear(stepR,stepC)
            }
            return false
          }

          // default allow for anything else
          return true
        }
        undoBtn.addEventListener('click',()=>{
          if(history.length){
            boardState=history.pop();
            turn=turn==='w'?'b':'w';
            selected=null;
            gameOver=false; // in case undoing past win
            statusEl.classList.remove('win');
            render();
          }
        })
        resetBtn.addEventListener('click',()=>{boardState=[
          '♜','♞','♝','♛','♚','♝','♞','♜',
          '♟','♟','♟','♟','♟','♟','♟','♟',
          '','','','','','','','',
          '','','','','','','','',
          '','','','','','','','',
          '','','','','','','','',
          '♙','♙','♙','♙','♙','♙','♙','♙',
          '♖','♘','♗','♕','♔','♗','♘','♖'
        ];turn='w';history=[];selected=null;gameOver=false;statusEl.classList.remove('win');render()})
        makeBoard();render()
      } else {
        // chess.js available, use complete rules
        const game=new Chess()
        let selected=null
        const files=['a','b','c','d','e','f','g','h']
        function makeBoard(){
          boardEl.innerHTML=''
          for(let r=8;r>=1;r--){
            for(let f=0;f<8;f++){
              const sq=files[f]+r
              const div=document.createElement('div')
              div.className='square '+(((f+r)%2===0)?'light':'dark')
              div.dataset.square=sq
              div.addEventListener('click',onSquareClick)
              boardEl.appendChild(div)
            }
          }
        }
        function render(){
          const squares=boardEl.querySelectorAll('.square')
          squares.forEach(sqEl=>{
            const sq=sqEl.dataset.square
            const piece=game.get(sq)
            sqEl.textContent=piece?unicode(piece.color==='w'?piece.type.toUpperCase():piece.type):''
            sqEl.classList.remove('highlight')
          })
          if(selected){
            const idx=[...boardEl.children].findIndex(e=>e.dataset.square===selected)
            if(idx>=0) boardEl.children[idx].classList.add('highlight')
          }
          turnEl.textContent=game.turn()==='w'?'白方':'黑方'
          updateStatus()
        }
        function onSquareClick(e){
          if(game.game_over()) return
          const sq=e.currentTarget.dataset.square
          if(selected){
            const moves=game.moves({square:selected,verbose:true}).map(m=>m.to)
            if(moves.includes(sq)){
              game.move({from:selected,to:sq,promotion:'q'})
              selected=null;render()
            } else {selected=null;render()}
          } else {
            const piece=game.get(sq)
            if(piece&&((piece.color==='w'&&game.turn()==='w')||(piece.color==='b'&&game.turn()==='b'))){
              selected=sq;render()
            }
          }
        }
        function updateStatus(){
          statusEl.classList.remove('win')
          if(game.in_checkmate()){
            statusEl.textContent='狀態：將死，'+(game.turn()==='w'?'黑方':'白方')+' 勝利'
            statusEl.classList.add('win')
          } else if(game.in_draw()){
            statusEl.textContent='狀態：和局'
            statusEl.classList.add('win')
          } else if(game.in_check()){
            statusEl.textContent='狀態：被將軍'
          } else{
            statusEl.textContent='狀態：進行中'
          }
        }
        function unicode(p){const m={p:'♟',r:'♜',n:'♞',b:'♝',q:'♛',k:'♚',P:'♙',R:'♖',N:'♘',B:'♗',Q:'♕',K:'♔'};return m[p]||''}
        undoBtn.addEventListener('click',()=>{game.undo();selected=null;statusEl.classList.remove('win');render()})
        resetBtn.addEventListener('click',()=>{game.reset();selected=null;statusEl.classList.remove('win');render()})
        makeBoard();render()
      }
    </script>
  </body>
</html>

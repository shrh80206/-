<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ше┐ц┤ЛцгЛ</title>
    <style>
      :root{--bg:#ffffff;--light:#f0d9b5;--dark:#b58863;--accent:#6B8E23}
      *{box-sizing:border-box}
      body{font-family:system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;margin:0;background:var(--bg);color:#111;display:flex;align-items:center;justify-content:center;padding:24px}
      .wrap{max-width:900px;width:100%}
      h1{margin:0 0 12px;text-align:center}
      .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
      .board{width:520px;height:520px;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);border:4px solid #333;margin:auto}
      .square{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:600;cursor:pointer;user-select:none}
      .light{background:var(--light)}
      .dark{background:var(--dark)}
      .highlight{outline:3px solid rgba(107,142,35,0.6)}
      .possible{outline:3px solid rgba(0,123,255,0.6)}
      .white-piece{color:#fff;text-shadow:1px 1px 2px #000}
      .black-piece{color:#000;text-shadow:1px 1px 1px #ccc}
      .controls{display:flex;flex-direction:column;gap:8px;padding-left:16px}
      .info{font-size:16px}
      .btn{padding:8px 10px;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer}
      .row{display:flex;gap:12px}
      pre{white-space:pre-wrap;background:#f7f7f7;padding:8px;border-radius:6px}
      #status.win{color:#c00;font-weight:700;font-size:1.2em}
      @media(max-width:880px){.wrap{padding:8px}.board{width:360px;height:360px}}
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>ше┐ц┤ЛцгЛя╝Ищ╗ЮщБ╕цгЛца╝чз╗хЛХя╝Й</h1>
      <div class="top">
        <div class="info">
          <div>хЫЮхРИя╝Ъ<strong id="turn">чЩ╜цЦ╣</strong></div>
          <div id="status">чЛАцЕЛя╝ЪщА▓шбМф╕н</div>
        </div>
        <div class="controls">
          <div class="row">
            <button id="undo" class="btn">цВФцгЛ</button>
            <button id="reset" class="btn">щЗНч╜о</button>
          </div>
          <div class="row" style="align-items:center">
            х░НцЙЛя╝Ъ
            <select id="aiSelector" class="btn" style="padding:4px 8px">
              <option value="none">ф║║щбЮ</option>
              <option value="w">щЫ╗шЕжчЩ╜</option>
              <option value="b">щЫ╗шЕжщ╗С</option>
            </select>
          </div>
          <div>
            <div style="font-weight:600">цгЛх▒АшиШщМДя╝ИPGNя╝Й</div>
            <pre id="pgn" style="max-height:140px;overflow:auto"></pre>
          </div>
        </div>
      </div>

      <div style="display:flex;gap:16px;align-items:flex-start">
        <div id="board" class="board" role="grid" aria-label="ше┐ц┤ЛцгЛцгЛчЫд"></div>
      </div>
    </div>

    <script src="https://unpkg.com/chess.js@1.0.0/chess.min.js"></script>
    <script>
      const boardEl = document.getElementById('board')
      const statusEl = document.getElementById('status')
      const turnEl = document.getElementById('turn')
      const undoBtn = document.getElementById('undo')
      const resetBtn = document.getElementById('reset')
      const aiSelector = document.getElementById('aiSelector')
      let aiSide = null
      aiSelector.addEventListener('change', e=>{
        aiSide = e.target.value==='none'?null:e.target.value
        maybeAIMove()
      })

      // if chess.js failed to load, fall back to simple static board
      if(typeof Chess !== 'function'){
        // manual logic from previous version
        let boardState = [
          'тЩЬ','тЩЮ','тЩЭ','тЩЫ','тЩЪ','тЩЭ','тЩЮ','тЩЬ',
          'тЩЯ','тЩЯ','тЩЯ','тЩЯ','тЩЯ','тЩЯ','тЩЯ','тЩЯ',
          '','','','','','','','',
          '','','','','','','','',
          '','','','','','','','',
          '','','','','','','','',
          'тЩЩ','тЩЩ','тЩЩ','тЩЩ','тЩЩ','тЩЩ','тЩЩ','тЩЩ',
          'тЩЦ','тЩШ','тЩЧ','тЩХ','тЩФ','тЩЧ','тЩШ','тЩЦ'
        ]
        let selected = null
        let turn = 'w'
        let history = []
        let gameOver = false

        function makeBoard(){
          boardEl.innerHTML = ''
          for(let r=8;r>=1;r--){
            for(let f=0;f<8;f++){
              const idx = (8-r)*8 + f
              const div = document.createElement('div')
              div.className = 'square ' + (((f + r) % 2 === 0) ? 'light' : 'dark')
              div.dataset.index = idx
              div.addEventListener('click', onSquareClick)
              boardEl.appendChild(div)
            }
          }
        }
        function render(){
          // remove any leftover possible indicators
          boardEl.querySelectorAll('.possible').forEach(el=>el.classList.remove('possible'))
          const squares = boardEl.querySelectorAll('.square')
          squares.forEach(sqEl=>{
            const idx=Number(sqEl.dataset.index)
            sqEl.textContent=boardState[idx]||''
            sqEl.classList.remove('highlight')
          })
          if(selected!==null){
            boardEl.children[selected].classList.add('highlight')
            // show legal moves
            for(let i=0;i<64;i++){
              if(i!==selected && legalManualMove && legalManualMove(selected,i)){
                boardEl.children[i].classList.add('possible')
              }
            }
          }
          turnEl.textContent=turn==='w'?'чЩ╜цЦ╣':'щ╗СцЦ╣'
          if(!gameOver){ // only overwrite when game still going
            statusEl.textContent='чЛАцЕЛя╝ЪщА▓шбМф╕н'
            statusEl.classList.remove('win')
          }
          maybeAIMove()
        }
        function clearPossible(){
          boardEl.querySelectorAll('.possible').forEach(el=>el.classList.remove('possible'))
        }
        async function onSquareClick(e){
          clearPossible();
          if(gameOver) return
          const idx=Number(e.currentTarget.dataset.index)
          if(selected===null){
            const piece=boardState[idx]
            if(piece && ((turn==='w'&&isWhite(piece))||(turn==='b'&&isBlack(piece)))){
              selected=idx;render()
            }
          } else {
            const dest=boardState[idx]
            if(dest && ((turn==='w'&&isWhite(dest))||(turn==='b'&&isBlack(dest)))){selected=null;render();return}
            // only allow legal moves in manual fallback
            if(typeof legalManualMove === 'function' && !legalManualMove(selected, idx)){
              statusEl.textContent = 'ф╕НхРИц│ХчЪДш╡░ц│Х';
              // keep selection active
              return;
            }
            history.push(boardState.slice())
            let moved=boardState[selected]
            // promotion choice for pawn via UI
            if((moved==='тЩЩ' && Math.floor(idx/8)===0) || (moved==='тЩЯ' && Math.floor(idx/8)===7)){
              const color = moved==='тЩЩ'?'w':'b'
              moved = await new Promise(resolve=>{
                showPromotionOptions(color,resolve)
              })
            }
            boardState[idx]=moved;boardState[selected]=''
            if(dest && (dest==='тЩФ'||dest==='тЩЪ')){finish(turn==='w'?'чЩ╜цЦ╣ ш┤Пф║Жя╝Б':'щ╗СцЦ╣ ш┤Пф║Жя╝Б');render();return}
            selected=null
            turn= turn==='w'?'b':'w'
            render()
          }
        }
        function isWhite(piece){return ['тЩЩ','тЩЦ','тЩШ','тЩЧ','тЩХ','тЩФ'].includes(piece)}
        function isBlack(piece){return ['тЩЯ','тЩЬ','тЩЮ','тЩЭ','тЩЫ','тЩЪ'].includes(piece)}
        function finish(text){
          statusEl.textContent=text
          statusEl.classList.add('win')
          gameOver = true
        }
        
        function maybeAIMove(){
          if(!aiSide || gameOver) return
          if(turn!==aiSide) return
          // small delay for realism
          setTimeout(()=>{
            if(typeof Chess==='function'){
              const moves = game.moves()
              if(moves.length){
                const m = moves[Math.floor(Math.random()*moves.length)]
                game.move(m)
                selected=null
                render()
              }
            } else {
              const moves=generateLegalMoves(aiSide)
              if(moves.length){
                const mv=moves[Math.floor(Math.random()*moves.length)]
                history.push(boardState.slice())
                const moved=boardState[mv.from]
                boardState[mv.to]=moved
                boardState[mv.from]=''
                // promotion check
                if((moved==='тЩЩ'&&Math.floor(mv.to/8)===0)||(moved==='тЩЯ'&&Math.floor(mv.to/8)===7)){
                  boardState[mv.to]=aiSide==='w'?'тЩХ':'тЩЫ'
                }
                if(boardState[mv.to]==='тЩФ'||boardState[mv.to]==='тЩЪ'){finish(aiSide==='w'?'чЩ╜цЦ╣ ш┤Пф║Жя╝Б':'щ╗СцЦ╣ ш┤Пф║Жя╝Б')}
                turn= turn==='w'?'b':'w'
                render()
              }
            }
          },200)
        }
        
        function generateLegalMoves(color){
          const list=[]
          for(let i=0;i<64;i++){
            const piece=boardState[i]
            if(piece && ((color==='w'&&isWhite(piece))||(color==='b'&&isBlack(piece)))){
              for(let j=0;j<64;j++){
                if(legalManualMove(i,j)) list.push({from:i,to:j})
              }
            }
          }
          return list
        }
        
        
        // display a modal overlay allowing user to choose promotion piece
        function showPromotionOptions(color,callback){
          const overlay=document.createElement('div')
          overlay.style.position='fixed';overlay.style.top=0;overlay.style.left=0;
          overlay.style.width='100%';overlay.style.height='100%';
          overlay.style.background='rgba(0,0,0,0.4)';
          overlay.style.display='flex';overlay.style.alignItems='center';
          overlay.style.justifyContent='center';overlay.style.zIndex=9999;
          overlay.addEventListener('click', e=>{
            if(e.target===overlay){
              document.body.removeChild(overlay);
              callback(color==='w'?'тЩХ':'тЩЫ');
            }
          });
          const box=document.createElement('div')
          box.style.background='#fff';box.style.padding='12px';box.style.borderRadius='8px';
          box.style.display='flex';box.style.flexDirection='column';box.style.alignItems='center';
          box.style.gap='12px';
          const title=document.createElement('div');
          title.textContent='шлЛщБ╕цУЗхНЗшоКцгЛхнР';
          title.style.fontSize='16px';title.style.marginBottom='6px';
          box.appendChild(title);
          const pieces = color==='w'?['тЩХ','тЩЦ','тЩЧ','тЩШ']:['тЩЫ','тЩЬ','тЩЭ','тЩЮ'];
          const row=document.createElement('div');row.style.display='flex';row.style.gap='12px';
          pieces.forEach(p=>{
            const btn=document.createElement('button');
            btn.textContent=p;btn.style.fontSize='28px';
            btn.style.padding='8px';btn.onclick=()=>{document.body.removeChild(overlay);callback(p)};
            row.appendChild(btn);
          });
          box.appendChild(row);
          overlay.appendChild(box);
          document.body.appendChild(overlay);
        }

        function legalManualMove(from,to){
          const piece=boardState[from]
          if(!piece) return false
          const target=boardState[to]
          // can't capture own piece
          if(target && ((isWhite(piece)&&isWhite(target))||(isBlack(piece)&&isBlack(target)))) return false

          const fromRow = Math.floor(from/8)
          const toRow = Math.floor(to/8)
          const fromCol = from%8
          const toCol = to%8
          const rowDiff = toRow - fromRow
          const colDiff = toCol - fromCol

          // pawn handled specially above
          if(piece==='тЩЩ' || piece==='тЩЯ'){
            const dir = isWhite(piece)? -1 : 1
            // straight move
            if(colDiff===0){
              if(rowDiff===dir) return target===''
              if(rowDiff===2*dir){
                if((isWhite(piece)&&fromRow===6)||(isBlack(piece)&&fromRow===1)){
                  const mid = from + dir*8
                  return boardState[mid]==='' && target===''
                }
              }
              return false
            }
            // capture diagonal
            if(Math.abs(colDiff)===1 && rowDiff===dir) return target!==''
            return false
          }

          // knight moves: L-shape
          if(piece==='тЩШ' || piece==='тЩЮ'){
            if((Math.abs(rowDiff)===2 && Math.abs(colDiff)===1) ||
               (Math.abs(rowDiff)===1 && Math.abs(colDiff)===2)) return true
            return false
          }

          // king: one square any direction
          if(piece==='тЩФ' || piece==='тЩЪ'){
            return Math.abs(rowDiff)<=1 && Math.abs(colDiff)<=1
          }

          // rook, bishop, queen require path checks
          function pathClear(deltaRow, deltaCol){
            let r=fromRow+deltaRow, c=fromCol+deltaCol
            while(r!==toRow || c!==toCol){
              const idx = r*8 + c
              if(boardState[idx] !== '') return false
              r += deltaRow; c += deltaCol
            }
            return true
          }

          // rook
          if(piece==='тЩЦ' || piece==='тЩЬ'){
            if(fromRow===toRow){
              const step = colDiff>0?1:-1
              return pathClear(0,step)
            }
            if(fromCol===toCol){
              const step = rowDiff>0?1:-1
              return pathClear(step,0)
            }
            return false
          }

          // bishop
          if(piece==='тЩЧ' || piece==='тЩЭ'){
            if(Math.abs(rowDiff)===Math.abs(colDiff)){
              const stepR = rowDiff>0?1:-1
              const stepC = colDiff>0?1:-1
              return pathClear(stepR,stepC)
            }
            return false
          }

          // queen
          if(piece==='тЩХ' || piece==='тЩЫ'){
            if(rowDiff===0){
              const step = colDiff>0?1:-1
              return pathClear(0,step)
            }
            if(colDiff===0){
              const step = rowDiff>0?1:-1
              return pathClear(step,0)
            }
            if(Math.abs(rowDiff)===Math.abs(colDiff)){
              const stepR = rowDiff>0?1:-1
              const stepC = colDiff>0?1:-1
              return pathClear(stepR,stepC)
            }
            return false
          }

          // default allow for anything else
          return true
        }
        undoBtn.addEventListener('click',()=>{
          if(history.length){
            boardState=history.pop();
            turn=turn==='w'?'b':'w';
            selected=null;
            gameOver=false; // in case undoing past win
            statusEl.classList.remove('win');
            render();
          }
        })
        resetBtn.addEventListener('click',()=>{boardState=[
          'тЩЬ','тЩЮ','тЩЭ','тЩЫ','тЩЪ','тЩЭ','тЩЮ','тЩЬ',
          'тЩЯ','тЩЯ','тЩЯ','тЩЯ','тЩЯ','тЩЯ','тЩЯ','тЩЯ',
          '','','','','','','','',
          '','','','','','','','',
          '','','','','','','','',
          '','','','','','','','',
          'тЩЩ','тЩЩ','тЩЩ','тЩЩ','тЩЩ','тЩЩ','тЩЩ','тЩЩ',
          'тЩЦ','тЩШ','тЩЧ','тЩХ','тЩФ','тЩЧ','тЩШ','тЩЦ'
        ];turn='w';history=[];selected=null;gameOver=false;statusEl.classList.remove('win');render()})
        makeBoard();render()
      } else {
        // chess.js available, use complete rules
        const game=new Chess()
        let selected=null
        const files=['a','b','c','d','e','f','g','h']
        function makeBoard(){
          boardEl.innerHTML=''
          for(let r=8;r>=1;r--){
            for(let f=0;f<8;f++){
              const sq=files[f]+r
              const div=document.createElement('div')
              div.className='square '+(((f+r)%2===0)?'light':'dark')
              div.dataset.square=sq
              div.addEventListener('click',onSquareClick)
              boardEl.appendChild(div)
            }
          }
        }
        function render(){
          const squares=boardEl.querySelectorAll('.square')
          squares.forEach(sqEl=>{
            const sq=sqEl.dataset.square
            const piece=game.get(sq)
            sqEl.textContent=piece?unicode(piece.color==='w'?piece.type.toUpperCase():piece.type):''
            sqEl.classList.remove('highlight','possible')
          })
          if(selected){
            const idx=[...boardEl.children].findIndex(e=>e.dataset.square===selected)
            if(idx>=0){
              boardEl.children[idx].classList.add('highlight')
              // show possible moves
              const moves=game.moves({square:selected,verbose:true}).map(m=>m.to)
              moves.forEach(sq=>{
                const el=[...boardEl.children].find(e=>e.dataset.square===sq)
                if(el) el.classList.add('possible')
              })
            }
          }
          turnEl.textContent=game.turn()==='w'?'чЩ╜цЦ╣':'щ╗СцЦ╣'
          updateStatus()
        }
        function onSquareClick(e){
          if(game.game_over()) return
          const sq=e.currentTarget.dataset.square
          if(selected){
            const moves=game.moves({square:selected,verbose:true}).map(m=>m.to)
            if(moves.includes(sq)){
              let promo='q'
              const p = game.get(selected)
              if(p && p.type==='p' && (sq[1]==='8' || sq[1]==='1')){
                const choice = prompt('хНЗшоКщБ╕щаЕя╝Ъq=хРО,r=ш╗К,b=ш▒б,n=щиОхгл','q')||'q'
                promo = choice.toLowerCase()
              }
              game.move({from:selected,to:sq,promotion:promo})
              selected=null;render()
            } else {selected=null;render()}
          } else {
            const piece=game.get(sq)
            if(piece&&((piece.color==='w'&&game.turn()==='w')||(piece.color==='b'&&game.turn()==='b'))){
              selected=sq;render()
            }
          }
        }
        function updateStatus(){
          statusEl.classList.remove('win')
          if(game.in_checkmate()){
            statusEl.textContent='чЛАцЕЛя╝Ъх░Зцн╗я╝М'+(game.turn()==='w'?'щ╗СцЦ╣':'чЩ╜цЦ╣')+' хЛЭхИй'
            statusEl.classList.add('win')
          } else if(game.in_draw()){
            statusEl.textContent='чЛАцЕЛя╝ЪхТМх▒А'
            statusEl.classList.add('win')
          } else if(game.in_check()){
            statusEl.textContent='чЛАцЕЛя╝Ъшвлх░Зш╗Н'
          } else{
            statusEl.textContent='чЛАцЕЛя╝ЪщА▓шбМф╕н'
          }
        }
        function unicode(p){const m={p:'тЩЯ',r:'тЩЬ',n:'тЩЮ',b:'тЩЭ',q:'тЩЫ',k:'тЩЪ',P:'тЩЩ',R:'тЩЦ',N:'тЩШ',B:'тЩЧ',Q:'тЩХ',K:'тЩФ'};return m[p]||''}
        undoBtn.addEventListener('click',()=>{game.undo();selected=null;statusEl.classList.remove('win');render()})
        resetBtn.addEventListener('click',()=>{game.reset();selected=null;statusEl.classList.remove('win');render()})
        makeBoard();render()
      }
    </script>
  </body>
</html>
